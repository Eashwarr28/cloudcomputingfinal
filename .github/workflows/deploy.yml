name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run tests
        run: python test.py

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Verify index.html
        run: |
          if [ -f "index.html" ]; then
            echo "✅ index.html found"
          else
            echo "❌ index.html missing"
            exit 1
          fi

  # AWS TEST USING OFFICIAL ACTION
  test-aws:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: List S3 Bucket
        run: |
          echo "=== TESTING AWS CONNECTION ==="
          echo "Bucket: ${{ secrets.AWS_S3_BUCKET }}"
          aws s3 ls s3://${{ secrets.AWS_S3_BUCKET }}/ || echo "ERROR: Cannot access bucket"
      
      - name: Test Upload
        run: |
          echo "test" > testfile.txt
          aws s3 cp testfile.txt s3://${{ secrets.AWS_S3_BUCKET }}/testfile.txt
          aws s3 rm s3://${{ secrets.AWS_S3_BUCKET }}/testfile.txt
          echo "✅ Upload and delete successful"

  deploy:
    runs-on: ubuntu-latest
    needs: test-aws
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --acl public-read \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"
