name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 1. BUILD PIPELINE
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: python test.py
      - name: Upload test results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test.py

  # 2. STATIC ANALYSIS (Bandit)
  static-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit test.py -f txt -o bandit-report.txt || true
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt

  # 3. DEPENDENCY SCANNING (Trivy)
  dependency-scan:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'

  # 4. TEST (Verify index.html exists)
  test:
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v4
      - name: Verify index.html exists
        run: |
          if [ -f "index.html" ]; then
            echo "✅ index.html found"
          else
            echo "❌ index.html missing"
            exit 1
          fi

  # 5. DEPLOY TO AWS S3 (USING AWS CLI - NO ARCHIVED ACTION)
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate version number
        run: echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to S3 using AWS CLI
        run: |
          echo "=== DEPLOYING VERSION: ${{ env.VERSION }} ==="
          echo "Bucket: ${{ secrets.AWS_S3_BUCKET }}"
          echo "Region: ${{ secrets.AWS_REGION }}"
          echo ""
          echo "=== Syncing files to S3 ==="
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} \
            --acl public-read \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.zip"
          
          echo ""
          echo "=== DEPLOYMENT COMPLETE ==="
          echo "Website URL: http://${{ secrets.AWS_S3_BUCKET }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com"
      
      - name: Save deployment info
        run: |
          echo "Deployment Version: ${{ env.VERSION }}" > deployment-version.txt
          echo "Deployment Time: $(date)" >> deployment-version.txt
          echo "Commit SHA: ${{ github.sha }}" >> deployment-version.txt
